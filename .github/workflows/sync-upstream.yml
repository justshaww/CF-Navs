name: Sync upstream branch

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch in this fork to update
        required: true
        default: develop
        type: string
      upstream_branch:
        description: Branch to read from the upstream repository
        required: true
        default: develop
        type: string
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.repository }}-${{ inputs.target_branch || 'develop' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch || 'develop' }}
          fetch-depth: 0

      - name: Configure upstream remote
        run: git remote add upstream https://github.com/lbjxr/CF-Navs.git

      - name: Fetch upstream
        run: git fetch --prune upstream "${{ inputs.upstream_branch || 'develop' }}"

      - name: Fast-forward target branch
        env:
          TARGET_BRANCH: ${{ inputs.target_branch || 'develop' }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch || 'develop' }}
        run: |
          set -euo pipefail
          git checkout "$TARGET_BRANCH"
          if git merge-base --is-ancestor "HEAD" "upstream/$UPSTREAM_BRANCH"; then
            if git diff --quiet HEAD "upstream/$UPSTREAM_BRANCH"; then
              echo "Already synchronized."
            else
              git merge --ff-only "upstream/$UPSTREAM_BRANCH"
              git push origin "HEAD:$TARGET_BRANCH"
            fi
          elif git merge-base --is-ancestor "upstream/$UPSTREAM_BRANCH" HEAD; then
            echo "Target branch is ahead of upstream; no changes made."
          else
            echo "Branches have diverged; refusing to merge or force-push automatically." >&2
            exit 1
          fi
