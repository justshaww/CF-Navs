name = "cf-navs"
main = "worker/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# 编译后的 Svelte 静态资源；SPA 模式，未命中的路径回退到 index.html
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "cf-navs-db"
database_id = "replace-with-your-d1-database-id"

[[kv_namespaces]]
binding = "SESSION"
id = "replace-with-your-kv-namespace-id"

[vars]
# 初始管理员用户名（首次部署用，之后可在后台修改）
INIT_ADMIN_USER = "admin"
# 初始密码请用 secret，不要写明文：
#   wrangler secret put INIT_ADMIN_PASSWORD
# Token 有效期（秒），默认 7 天
SESSION_TTL = "604800"
